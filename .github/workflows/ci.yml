name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: jdx/mise-action@1648a7812b9aeae629881980618f079932869151 # v4.0.1
        with:
          cache: true

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm --filter @zero/core typecheck

      - name: Build
        run: pnpm build
        env:
          # Dummy values; the build imports `auth` -> `db` but never connects or
          # authenticates. DATABASE_URL is mandatory: db/index.ts throws at import
          # if it's unset (pg.Pool is lazy, so the connection is never opened).
          # BETTER_AUTH_SECRET is optional — without it Better Auth rejects its
          # built-in default secret under production and logs a non-fatal error;
          # the dummy just keeps the build log clean.
          DATABASE_URL: postgres://ci-build-only:not-a-real-password@localhost:5432/not-a-real-db
          BETTER_AUTH_SECRET: ci-build-only-not-a-real-secret
